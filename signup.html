<!DOCTYPE html>
<html>
    <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>CampusPlanner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="./reset.css">
    <link rel="stylesheet" href="./main.css">
</head>
    <body>
        <div class="container">
            <div class="modal">
                <div class="content">
                    <div class="header">
                        <h4 id="logo-text"><span id="logo-icon">📚</span>CampusPlanner</h4>
                    </div>
                    <div class="welcome">
                        <h2 id="welcome-text">Create an account</h2>
                        <span class="backgroundText">Start organizing your academic life for free</span>
                    </div>
                    <div class="input">
                        <div id="input-text">Full name</div>
                        <input type="text" placeholder="Jane Doe">
                        <div id="input-text">University email</div>
                        <input type="email" placeholder="you@university.edu">
                        <div id="input-text">Password</div>
                        <input type="password" placeholder="••••••••">
                        <div id="input-text">Confirm password</div>
                        <input type="password" placeholder="••••••••">
                    </div>
                    <div class="button">
                        <a href="./dashboard.html"><div>Create account <i class="fa-solid fa-arrow-right"></i></div></a>
                    </div>
                    <div>
                        <h5 id="footer-text" class="backgroundText">Already have an account? <a href="./index.html"><span id="sign-up-text">Sign in.</span></a></h5>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
